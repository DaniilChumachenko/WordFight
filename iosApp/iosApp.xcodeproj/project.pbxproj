			shellScript = "if [ \"YES\" = \"$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED\" ]; then\n  echo \"Skipping Gradle build task invocation due to OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED environment variable set to \\\"YES\\\"\"\n  exit 0\nfi\nexport JAVA_HOME=\"/Applications/Android Studio.app/Contents/jbr/Contents/Home\"\nexport PATH=\"/opt/homebrew/bin:/usr/local/bin:$JAVA_HOME/bin:$PATH\"\nexport LIBRARY_PATH=\"$DEVELOPER_DIR/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos:$DEVELOPER_DIR/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphonesimulator:${LIBRARY_PATH:-}\"\nexport KOTLIN_FRAMEWORK_BUILD_TYPE=\"${KOTLIN_FRAMEWORK_BUILD_TYPE:-debug}\"\n# Prevent Xcode debug-dylib flags from leaking into synthetic Pods builds.\nexport ENABLE_DEBUG_DYLIB=NO\nexport ENABLE_PREVIEWS=NO\nunset EXECUTABLE_DEBUG_DYLIB_PATH EXECUTABLE_DEBUG_DYLIB_INSTALL_NAME\ncd \"$SRCROOT/..\"\nbuild_pods() {\n  xcodebuild \\\n    -project \"$SRCROOT/Pods/Pods.xcodeproj\" \\\n    -scheme \"Pods-iosApp\" \\\n    -configuration \"$CONFIGURATION\" \\\n    -destination \"generic/platform=iOS\" \\\n    BUILD_DIR=\"$BUILD_DIR\" \\\n    PODS_BUILD_DIR=\"$BUILD_DIR\" \\\n    COMPILER_INDEX_STORE_ENABLE=NO \\\n    SWIFT_ENABLE_EXPLICIT_MODULES=NO \\\n    CLANG_ENABLE_EXPLICIT_MODULES=NO \\\n    ENABLE_DEBUG_DYLIB=NO \\\n    ONLY_ACTIVE_ARCH=YES\n}\nrun_gradle() {\n  ./gradlew :composeApp:syncPodComposeResourcesForIos :composeApp:embedAndSignPodAppleFrameworkForXcode --no-daemon --max-workers=1\n}\ncopy_compose_resources() {\n  RES_SRC=\"$SRCROOT/../composeApp/build/compose/cocoapods/compose-resources\"\n  RES_DST=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/compose-resources\"\n  if [ ! -d \"$RES_SRC\" ]; then\n    echo \"Compose resources not found at $RES_SRC\"\n    return 1\n  fi\n  rm -rf \"$RES_DST\"\n  mkdir -p \"$RES_DST\"\n  cp -R \"$RES_SRC\"/. \"$RES_DST\"/\n  echo \"Compose resources copied to $RES_DST\"\n}\nif ! build_pods; then\n  echo \"Pods build failed.\"\n  exit 1\nfi\nif ! run_gradle; then\n  echo \"First Gradle attempt failed, retrying once...\"\n  ./gradlew --stop || true\n  if ! run_gradle; then\n    echo \"Second Gradle attempt failed.\"\n    exit 1\n  fi\nfi\nif ! copy_compose_resources; then\n  exit 1\nfi\n";
